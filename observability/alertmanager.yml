global:
  resolve_timeout: 5m

route:
  receiver: local-webhook
  group_by:
    - alertname
    - service
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: local-webhook
      continue: false
    - matchers:
        - severity=~"warning|info"
      receiver: local-webhook
      continue: false

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://host.docker.internal:8000/api/control-plane/alerts
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity=~"warning|info"
    equal:
      - alertname
      - service
