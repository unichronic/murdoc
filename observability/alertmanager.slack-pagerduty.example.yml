global:
  resolve_timeout: 5m
  slack_api_url: https://hooks.slack.com/services/REPLACE/ME
  pagerduty_url: https://events.pagerduty.com/v2/enqueue

route:
  receiver: slack
  group_by:
    - alertname
    - service
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: pagerduty-and-slack
    - matchers:
        - severity=~"warning|info"
      receiver: slack

receivers:
  - name: slack
    slack_configs:
      - channel: "#murdoc-alerts"
        send_resolved: true
        title: "[Murdoc] {{ .CommonLabels.severity }}: {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"

  - name: pagerduty-and-slack
    pagerduty_configs:
      - routing_key: REPLACE_WITH_PAGERDUTY_ROUTING_KEY
        severity: "{{ .CommonLabels.severity }}"
        description: "{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}"
        send_resolved: true
    slack_configs:
      - channel: "#murdoc-alerts"
        send_resolved: true
        title: "[Murdoc CRITICAL] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"
