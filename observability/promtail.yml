server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: agentvault-events
    static_configs:
      - targets:
          - localhost
        labels:
          job: agentvault-events
          service: agentvault-gateway
          __path__: /var/log/agentvault/agentvault-events.jsonl
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            request_id: request_id
            trace_id: trace_id
            layer: layer
            decision: decision
            reason: reason
      - labels:
          level:
          event:
          layer:
          decision:
          reason:
      - structured_metadata:
          request_id:
          trace_id:
